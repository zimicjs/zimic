name: Zimic Release NPM Test
description: Test a released Zimic project on NPM.

inputs:
  ref-name:
    description: The Git reference name to release
    required: true
  project-name:
    description: The project name to release
    required: true
  project-directory:
    description: The project directory to release
    required: true
  turbo-token:
    description: Turbo remote cache token
    required: false
  turbo-team:
    description: Turbo remote cache team
    required: false

runs:
  using: composite
  steps:
    - name: Get Zimic release version
      id: zimic-version
      uses: ./.github/actions/zimic-version
      with:
        project-name: ${{ inputs.project-name }}
        project-directory: ${{ inputs.project-directory }}
        validate-ref-name: ${{ inputs.ref_name }}

    - name: Set up Zimic
      uses: ./.github/actions/zimic-setup
      id: zimic-setup
      with:
        turbo-token: ${{ inputs.turbo-token }}
        turbo-team: ${{ inputs.turbo-team }}
        install: '"@zimic/*..." "zimic-test-client..." "zimic-example*..."'
        build: '"zimic-test-client^..." "zimic-example*^..."'
        setup: '"zimic-test-client..." "zimic-example*..."'

    - name: Change package versions for testing
      shell: bash
      run: |
        echo "Using ${{ inputs.project-name }}@${{ steps.zimic-version.outputs.value }} for testing..."

        # Change references in the format `"<package>": "<version> || workspace:<version>"` to use the released version.
        # We need to preserve existing "|| workspace:<version>" to prevent turbo from warning about cyclic dependencies.
        sed -i -E \
          "s;\"${{ inputs.project-name }}\": \"([^\"]+?)( \|\| workspace:[^\"]+)\";\"${{ inputs.project-name }}\": \"${{ steps.zimic-version.outputs.value }}\2\";" \
          {apps,examples,packages}/*/package.json examples/package.json

        # Change references in the format "<package>": "<version>" to use the released version.
        sed -i -E \
          "s;\"${{ inputs.project-name }}\": \"([^\" ]+)\";\"${{ inputs.project-name }}\": \"${{ steps.zimic-version.outputs.value }}\";" \
          {apps,examples,packages}/*/package.json examples/package.json

        # Change package name to force pnpm to fetch it from NPM instead of using the local workspace version
        sed -i -E \
          "s;\"name\": \"${{ inputs.project-name }}\";\"name\": \"${{ inputs.project-name }}-tmp\";" \
          {apps,examples,packages}/*/package.json examples/package.json

    - name: Wait for released package to be available on NPM
      shell: bash
      run: |
        timeout 60s bash -c '
          until pnpm view ${{ inputs.project-name }} versions --json | grep --quiet "${{ steps.zimic-version.outputs.value }}"; do
            echo "${{ inputs.project-name }}@${{ steps.zimic-version.outputs.value }} is not yet available on NPM..."
            sleep 5
            echo "Checking again..."
          done
        '

        echo "${{ inputs.project-name }}@${{ steps.zimic-version.outputs.value }} is available on NPM."

    - name: Test released package
      shell: bash
      run: |
        # Allow scripts/postinstall.mjs to autofix pnpm-lock.yaml, in case projects stopped referencing @zimic/*
        # packages using local links. pnpm sometimes removes links to local packages in favor of registry versions after
        # installing or updating packages.
        timeout 90s bash -c "
          until pnpm install --no-frozen-lockfile ${{ steps.zimic-setup.outputs.install-filters }}; do
            sleep 5
            echo 'Retrying...'
          done
        "

        echo 'Re-running `pnpm install` in case `pnpm-lock.yaml` was changed by scripts/postinstall.mjs...'
        pnpm install --no-frozen-lockfile ${{ steps.zimic-setup.outputs.install-filters }}

        # Return the package name back to the original for turbo tasks
        sed -i -E \
          "s;\"name\": \"${{ inputs.project-name }}-tmp\";\"name\": \"${{ inputs.project-name }}\";" \
          {apps,examples,packages}/*/package.json examples/package.json

        pnpm turbo \
          types:check lint:turbo \
          --continue \
          --concurrency 100% \
          ${{ steps.zimic-setup.outputs.install-filters }}

        pnpm turbo \
          types:check lint:turbo test:turbo \
          --continue \
          --concurrency 1 \
          ${{ steps.zimic-setup.outputs.install-filters }}
      env:
        TURBO_TOKEN: ${{ inputs.turbo-token }}
        TURBO_TEAM: ${{ inputs.turbo-team }}
        TURBO_LOG_ORDER: stream
        ALLOWED_NON_LOCAL_PACKAGES: ${{ inputs.project-name }}
        EXIT_ON_NON_LOCAL_PACKAGES: false

    - name: Save turbo cache
      if: ${{ always() }}
      uses: actions/cache/save@v4
      with:
        path: .turbo/cache
        key: ${{ runner.os }}-turbo
