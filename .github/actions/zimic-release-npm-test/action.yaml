name: Zimic Release NPM Test
description: Test a released Zimic project on NPM.

inputs:
  ref-name:
    description: The Git reference name to release
    required: true
  project-name:
    description: The project name to release
    required: true
  project-directory:
    description: The project directory to release
    required: true
  turbo-token:
    description: Turbo remote cache token
    required: false
  turbo-team:
    description: Turbo remote cache team
    required: false

runs:
  using: composite
  steps:
    - name: Get Zimic release version
      id: zimic-version
      uses: ./.github/actions/zimic-version
      with:
        project-name: ${{ inputs.project-name }}
        project-directory: ${{ inputs.project-directory }}
        validate-ref-name: ${{ inputs.ref_name }}

    - name: Set up Zimic
      uses: ./.github/actions/zimic-setup
      id: zimic-setup
      with:
        turbo-token: ${{ inputs.turbo-token }}
        turbo-team: ${{ inputs.turbo-team }}
        install: '"@zimic/*..." "zimic-test-client..." "zimic-example*..."'
        build: '"zimic-test-client^..." "zimic-example*^..."'

    - name: Change package versions for testing
      shell: bash
      run: |
        echo "Using ${{ inputs.project-name }}@${{ steps.zimic-version.outputs.value }} for testing..."

        for packageJsonPath in apps/zimic-test-client/package.json examples/package.json examples/*/package.json packages/*/package.json; do
          if [[ ! -f "$packageJsonPath" ]]; then
            continue
          fi

          jq \
            --arg package "$PROJECT_NAME" \
            --arg version "$PROJECT_VERSION" '
              reduce ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"][] as $field (.;
                if .[$field][$package] == null then . else .[$field][$package] = $version end
              )
            ' "$packageJsonPath" > "$packageJsonPath.tmp"
          mv "$packageJsonPath.tmp" "$packageJsonPath"
        done

        targetPackageJsonPath="$PROJECT_DIRECTORY/package.json"

        # Change the version to a temporary one to force pnpm to fetch the package from NPM instead of using a local file reference.
        jq \
          --arg version "0.0.0-zimic-release-target-tmp" '
            .version = $version
          ' "$targetPackageJsonPath" > "$targetPackageJsonPath.tmp"
        mv "$targetPackageJsonPath.tmp" "$targetPackageJsonPath"
      env:
        PROJECT_NAME: ${{ inputs.project-name }}
        PROJECT_DIRECTORY: ${{ inputs.project-directory }}
        PROJECT_VERSION: ${{ steps.zimic-version.outputs.value }}

    - name: Wait for released package to be available on NPM
      shell: bash
      run: |
        timeout 60s bash -c '
          until pnpm view ${{ inputs.project-name }} versions --json | grep --quiet "${{ steps.zimic-version.outputs.value }}"; do
            echo "${{ inputs.project-name }}@${{ steps.zimic-version.outputs.value }} is not yet available on NPM..."
            sleep 5
            echo "Checking again..."
          done
        '

        echo "${{ inputs.project-name }}@${{ steps.zimic-version.outputs.value }} is available on NPM."

    - name: Test released package
      shell: bash
      run: |
        timeout 90s bash -c "
          until pnpm install --no-frozen-lockfile ${{ steps.zimic-setup.outputs.install-filters }}; do
            sleep 5
            echo 'Retrying...'
          done
        "

        pnpm turbo setup \
          --concurrency 100% \
          --filter 'zimic-test-client' \
          --filter 'zimic-example*'

        pnpm turbo types:check lint:turbo \
          --continue \
          --concurrency 100% \
          --filter 'zimic-test-client' \
          --filter 'zimic-example*'

        pnpm turbo test:turbo \
          --continue \
          --concurrency 1 \
          --filter 'zimic-test-client' \
          --filter 'zimic-example*'
      env:
        TURBO_TOKEN: ${{ inputs.turbo-token }}
        TURBO_TEAM: ${{ inputs.turbo-team }}
        TURBO_LOG_ORDER: stream

    - name: Restore released package metadata
      if: ${{ always() }}
      shell: bash
      run: |
        targetPackageJsonPath="$PROJECT_DIRECTORY/package.json"
        jq \
          --arg version "$PROJECT_VERSION" '
            .version = $version
          ' "$targetPackageJsonPath" > "$targetPackageJsonPath.tmp"
        mv "$targetPackageJsonPath.tmp" "$targetPackageJsonPath"
      env:
        PROJECT_DIRECTORY: ${{ inputs.project-directory }}
        PROJECT_VERSION: ${{ steps.zimic-version.outputs.value }}

    - name: Save turbo cache
      if: ${{ always() }}
      uses: actions/cache/save@v5
      with:
        path: .turbo/cache
        key: ${{ runner.os }}-turbo
