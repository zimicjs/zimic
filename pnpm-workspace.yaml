minimumReleaseAge: 4320 # 3 days in minutes
autoInstallPeers: true
engineStrict: false
sideEffectsCache: false
ignoreWorkspaceCycles: true
linkWorkspacePackages: true
verifyDepsBeforeRun: false

minimumReleaseAgeExclude:
  - '@zimic/*'

packages:
  - apps/*
  - packages/*
  - examples
  - examples/*
  - docs/*

overrides:
  '@babel/core@7': ^7.29.6
  '@babel/plugin-transform-modules-systemjs@7': ^7.29.4

  dompurify@3: ^3.4.11

  esbuild@0: ^0.28.1

  fast-uri@3: ^3.1.2

  form-data@4: ^4.0.6

  glob@7: ^10.5.0
  glob@8: ^10.5.0
  glob@9: ^10.5.0
  glob@10: ^10.5.0

  lodash@4: ^4.17.23

  qs@6: ^6.15.2
  rollup@4: ^4.59.0

  node-forge@1: ^1.3.2

  mdast-util-to-hast@13: ^13.2.1

  minimatch@3: ^3.1.3
  minimatch@5: ^5.1.7
  minimatch@9: ^9.0.6

  postcss@8: ^8.5.13

  http-proxy-middleware@2: ^3.0.6
  http-proxy-middleware@3: ^3.0.6

  joi@17: ^17.13.4

  js-yaml@4: ^4.2.0

  launch-editor@2: ^2.14.1

  serialize-javascript@6: ^7.0.5
  serialize-javascript@7: ^7.0.5

  shell-quote@1: ^1.8.4

  svgo@3: ^3.3.3

  undici@7: ^7.28.0

  uuid@8: ^11.1.1
  uuid@9: ^11.1.1
  uuid@10: ^11.1.1
  uuid@11: ^11.1.1

  vite@7: ^7.3.5

  webpack-dev-server@5: ^5.2.5
  webpack@5: ^5.104.1

  yaml@2: ^2.8.3

  # Temporary workaround for https://github.com/facebook/docusaurus/issues/11923.
  webpackbar: ^7.0.0

allowBuilds:
  '@swc/core': true
  '@zimic/interceptor': true
  bufferutil: true
  core-js: true
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
