  glob@7: ^10.5.0
  glob@8: ^10.5.0
  glob@9: ^10.5.0
  glob@10: ^10.5.0

  lodash@4: ^4.17.23

  qs@6: ^6.14.2
  rollup@4: ^4.59.0

  node-forge@1: ^1.3.2

  mdast-util-to-hast@13: ^13.2.1

  minimatch@3: ^3.1.3
  minimatch@5: ^5.1.7
  minimatch@9: ^9.0.6

  postcss@8: ^8.5.13

  serialize-javascript@6: ^7.0.5
  serialize-javascript@7: ^7.0.5
  svgo@3: ^3.3.3

  vite@7: ^7.3.2

  webpack@5: ^5.104.1

