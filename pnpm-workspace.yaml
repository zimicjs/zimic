minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@zimic/*'
  - '@types/*'

packages:
  - apps/*
  - packages/*
  - examples
  - examples/*
  - docs/*

onlyBuiltDependencies:
  - '@swc/core'
  - '@zimic/interceptor'
  - bufferutil
  - core-js
  - core-js-pure
  - esbuild
  - msw
  - sharp
  - unrs-resolver

